name: Update GitHub metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GitHub metrics
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/update-github-metrics.mjs

      - name: Commit metrics update
        run: |
          if git diff --quiet -- src/content/github-metrics.json; then
            echo "No metrics changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/github-metrics.json
          git commit -m "Update GitHub metrics"
          git push
